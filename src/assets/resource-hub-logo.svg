<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0099ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0055ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.3"/>
  
  <!-- Central hub -->
  <circle cx="100" cy="100" r="25" fill="url(#grad1)"/>
  
  <!-- Top node -->
  <circle cx="100" cy="45" r="12" fill="url(#grad2)"/>
  <line x1="100" y1="70" x2="100" y2="55" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Bottom node -->
  <circle cx="100" cy="155" r="12" fill="url(#grad2)"/>
  <line x1="100" y1="130" x2="100" y2="145" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Left node -->
  <circle cx="45" cy="100" r="12" fill="url(#grad2)"/>
  <line x1="70" y1="100" x2="55" y2="100" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Right node -->
  <circle cx="155" cy="100" r="12" fill="url(#grad2)"/>
  <line x1="130" y1="100" x2="145" y2="100" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Diagonal nodes -->
  <!-- Top-right -->
  <circle cx="130" cy="70" r="8" fill="url(#grad2)" opacity="0.8"/>
  <line x1="115" y1="85" x2="125" y2="75" stroke="url(#grad1)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Bottom-right -->
  <circle cx="130" cy="130" r="8" fill="url(#grad2)" opacity="0.8"/>
  <line x1="115" y1="115" x2="125" y2="125" stroke="url(#grad1)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Bottom-left -->
  <circle cx="70" cy="130" r="8" fill="url(#grad2)" opacity="0.8"/>
  <line x1="85" y1="115" x2="75" y2="125" stroke="url(#grad1)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Top-left -->
  <circle cx="70" cy="70" r="8" fill="url(#grad2)" opacity="0.8"/>
  <line x1="85" y1="85" x2="75" y2="75" stroke="url(#grad1)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Center icon detail -->
  <g transform="translate(100, 100)">
    <text x="0" y="8" font-size="20" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">↔</text>
  </g>
</svg>